openapi: 3.0.0
info:
  title: Inventory Management API
  version: 1.0.0
  description: API documentation for Inventory service

servers:
  - url: http://localhost:3001
    description: Local server

paths:
  /inventoryByProductIds:
    post:
      summary: Get inventory by product IDs
      description: Retrieve inventory information for specified product IDs
      tags:
        - Inventory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetInventoryRequest'
      responses:
        '200':
          description: Successfully retrieved inventory
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /inventoryByProductIds/update:
    put:
      summary: Update inventory for product IDs
      description: Update inventory by incrementing reserved quantity for products in an order
      tags:
        - Inventory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateInventoryRequest'
      responses:
        '200':
          description: Inventory updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '500':
          description: Error updating inventory
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    GetInventoryRequest:
      type: object
      required:
        - ids
      properties:
        ids:
          type: array
          items:
            type: string
          description: Array of product IDs to retrieve inventory for
      example:
        ids: ["prod_001", "prod_002", "prod_003"]

    UpdateInventoryRequest:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/InventoryItem'
          description: Array of items to update inventory for
      example:
        items:
          - productId: "prod_001"
            quantity: 5
          - productId: "prod_002"
            quantity: 3

    InventoryItem:
      type: object
      required:
        - productId
        - quantity
      properties:
        productId:
          type: string
          description: The product ID
        quantity:
          type: integer
          description: The quantity to reserve

    InventoryData:
      type: object
      properties:
        productId:
          type: string
          description: The product ID
        quantity:
          type: integer
          description: Available quantity
        reserved:
          type: integer
          description: Reserved quantity

    SuccessResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          oneOf:
            - type: array
              items:
                $ref: '#/components/schemas/InventoryData'
            - type: string

    ErrorResponse:
      type: object
      required:
        - success
        - error
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
          description: Error message
